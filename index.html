<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Natnat's Feedback System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .feedback-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        @keyframes idleLogo {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.03); }
            100% { transform: translateY(0) scale(1); }
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
            object-fit: contain;
            animation: idleLogo 4s ease-in-out infinite;
        }

        .feedback-container h2 {
            margin-bottom: 10px;
            font-size: 24px;
            text-align: center;
        }

        .feedback-container p {
            color: #6b7280;
            text-align: center;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .rating-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            min-height: 100px;
        }

        .rating-group {
            display: flex;
            justify-content: center;
            flex-direction: row-reverse;
        }

        .rating-group input {
            display: none;
        }

        .rating-group label {
            font-size: 45px;
            color: #d1d5db;
            cursor: pointer;
            padding: 0 5px;
            transition: color 0.2s ease, transform 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .rating-group label:hover {
            transform: scale(1.1);
        }

        .rating-group input:checked ~ label,
        .rating-group label:hover,
        .rating-group label:hover ~ label {
            color: #fbbf24;
        }

        .reaction-image {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #f3f4f6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
            transition: opacity 0.3s ease;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #111111;
            box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.2);
        }

        .captcha-wrapper {
            display: flex;
            flex-wrap: wrap;
            align-items: stretch;
            gap: 10px;
            margin-bottom: 10px;
        }

        #captchaCanvas {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background-color: #e5e7eb;
            letter-spacing: 5px;
            flex-grow: 1;
            max-width: 100%;
            height: 70px;
            touch-action: none;
        }

        .refresh-btn {
            background-color: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 0 20px;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            min-height: 50px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .refresh-btn:hover, 
        .refresh-btn:active {
            background-color: #e5e7eb;
        }

        #captchaError {
            color: #ef4444;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        button[type="submit"] {
            width: 100%;
            background-color: #111111;
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        button[type="submit"]:hover {
            background-color: #333333;
        }

        .success-message, .cooldown-message {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .success-message h3 {
            color: #10b981;
            margin-bottom: 10px;
        }

        .cooldown-message h3 {
            color: #f59e0b;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) {
            .feedback-container {
                padding: 25px 20px;
            }
            .rating-group label {
                font-size: 45px;
            }
            .captcha-wrapper {
                flex-direction: column;
            }
            .refresh-btn {
                padding: 12px;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="feedback-container">
        <div class="logo-container">
            <img src="Images/Logo.png" alt="Company Logo">
        </div>

        <form id="feedbackForm">
            <h2>Thank you and Provide some Feedback.</h2>
            <p>Let us know how we did today.</p>

            <label style="display: block; text-align: center; font-weight: 600; font-size: 14px; margin-bottom: 8px;">Your Rating:</label>
            
            <div class="rating-wrapper">
                <div class="rating-group" id="rating-group">
                    <input type="radio" id="star5" name="rating" value="5" required />
                    <label for="star5">★</label>
                    <input type="radio" id="star4" name="rating" value="4" />
                    <label for="star4">★</label>
                    <input type="radio" id="star3" name="rating" value="3" />
                    <label for="star3">★</label>
                    <input type="radio" id="star2" name="rating" value="2" />
                    <label for="star2">★</label>
                    <input type="radio" id="star1" name="rating" value="1" />
                    <label for="star1">★</label>
                </div>
                <img id="reactionImage" class="reaction-image" alt="Reaction">
            </div>

            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" placeholder="Tell us what you think..." required></textarea>
            </div>

            <div class="form-group">
                <label for="captchaInput">Verify you are human (Case Sensitive):</label>
                <div class="captcha-wrapper">
                    <canvas id="captchaCanvas"></canvas>
                    <button type="button" id="refreshCaptcha" class="refresh-btn" title="Refresh CAPTCHA">↻</button>
                </div>
                <input type="text" id="captchaInput" placeholder="Type the text exactly as shown" required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                <div id="captchaError">Incorrect CAPTCHA. Please try again.</div>
            </div>

            <button type="submit">Submit Feedback</button>
        </form>

        <div id="successMessage" class="success-message">
            <h3>Thank You!</h3>
            <p>Your feedback has been successfully submitted.</p>
        </div>

        <div id="cooldownMessage" class="cooldown-message">
            <h3>Come Back Later</h3>
            <p>You can only submit feedback once every 24 hours.</p>
            <p id="timeRemaining" style="font-weight: bold; margin-top: 15px; color: #555;"></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('feedbackForm');
        const successMessage = document.getElementById('successMessage');
        const cooldownMessage = document.getElementById('cooldownMessage');
        const BACKEND_URL = 'https://unoriginally-cnidogenous-josh.ngrok-free.dev/api/feedback/submit';

        const reactionImage = document.getElementById('reactionImage');
        const starLabels = document.querySelectorAll('.rating-group label');
        const ratingInputs = document.querySelectorAll('.rating-group input');
        const ratingGroup = document.getElementById('rating-group');

        function showThinkingImage() {
            const randomPic = Math.floor(Math.random() * 3) + 1;
            reactionImage.src = `Images/Think${randomPic}.jpg`;
            reactionImage.style.display = 'block';
        }

        function updateReactionImage(starValue) {
            const randomPic = Math.floor(Math.random() * 3) + 1;
            reactionImage.src = `Images/Star${starValue}-${randomPic}.jpg`;
            reactionImage.style.display = 'block';
        }

        showThinkingImage();

        starLabels.forEach(label => {
            label.addEventListener('mouseenter', () => {
                const inputId = label.getAttribute('for');
                const input = document.getElementById(inputId);
                updateReactionImage(input.value);
            });
        });

        ratingGroup.addEventListener('mouseleave', () => {
            const checkedInput = document.querySelector('.rating-group input:checked');
            if (checkedInput) {
                updateReactionImage(checkedInput.value);
            } else {
                showThinkingImage();
            }
        });

        ratingInputs.forEach(input => {
            input.addEventListener('change', () => {
                updateReactionImage(input.value);
            });
        });

        const COOLDOWN_MS = 24 * 60 * 60 * 1000;
        let currentCaptchaString = "";

        function checkCooldown() {
            const lastSubmit = localStorage.getItem('natnat_feedback_last_submit');
            if (lastSubmit) {
                const timeSinceSubmit = Date.now() - parseInt(lastSubmit);
                if (timeSinceSubmit < COOLDOWN_MS) {
                    form.style.display = 'none';
                    cooldownMessage.style.display = 'block';

                    const remainingMs = COOLDOWN_MS - timeSinceSubmit;
                    const remainingHours = Math.floor(remainingMs / (1000 * 60 * 60));
                    const remainingMins = Math.floor((remainingMs % (1000 * 60 * 60)) / (1000 * 60));
                    document.getElementById('timeRemaining').textContent = `Try again in ${remainingHours}h ${remainingMins}m.`;
                    return true;
                }
            }
            return false;
        }

        function generateCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            const logicalWidth = rect.width > 0 ? rect.width : 240;
            const logicalHeight = 70;

            canvas.width = logicalWidth * dpr;
            canvas.height = logicalHeight * dpr;
            ctx.scale(dpr, dpr);
            ctx.clearRect(0, 0, logicalWidth, logicalHeight);
            ctx.fillStyle = '#f3f4f6';
            ctx.fillRect(0, 0, logicalWidth, logicalHeight);

            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789@#$%&';
            currentCaptchaString = '';

            for (let i = 0; i < 6; i++) {
                currentCaptchaString += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            for (let i = 0; i < 35; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * logicalWidth, Math.random() * logicalHeight);
                ctx.lineTo(Math.random() * logicalWidth, Math.random() * logicalHeight);
                ctx.strokeStyle = `rgba(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255}, 0.7)`;
                ctx.lineWidth = Math.random() * 3;
                ctx.stroke();
            }

            for (let i = 0; i < 200; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * logicalWidth, Math.random() * logicalHeight, Math.random() * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255}, 0.6)`;
                ctx.fill();
            }

            const totalSpacing = logicalWidth - 40;
            const charSpacing = totalSpacing / 6;

            for (let i = 0; i < currentCaptchaString.length; i++) {
                ctx.save();
                const x = 20 + (i * charSpacing) + (Math.random() * 10 - 5);
                const y = 45 + (Math.random() * 10 - 5);
                ctx.translate(x, y);
                const angle = (Math.random() - 0.5) * Math.PI / 2;
                ctx.rotate(angle);
                const fontSize = 24 + Math.random() * 10;
                const fonts = ['Georgia', 'Courier New', 'Impact', 'Times New Roman'];
                const font = fonts[Math.floor(Math.random() * fonts.length)];
                ctx.font = `bold ${fontSize}px ${font}`;
                ctx.fillStyle = `rgb(${Math.random()*120}, ${Math.random()*120}, ${Math.random()*120})`;
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.shadowBlur = 3;
                ctx.fillText(currentCaptchaString[i], -10, 0);
                ctx.restore();
            }
        }

        window.addEventListener('load', () => {
            if (!checkCooldown()) {
                generateCaptcha();
            }
        });

        window.addEventListener('resize', () => {
            if (form.style.display !== 'none') {
                setTimeout(generateCaptcha, 100);
            }
        });

        document.getElementById('refreshCaptcha').addEventListener('click', () => {
            generateCaptcha();
            document.getElementById('captchaInput').value = '';
            document.getElementById('captchaError').style.display = 'none';
        });

        form.addEventListener('submit', async function(event) {
            event.preventDefault();

            const userInput = document.getElementById('captchaInput').value;
            if (userInput !== currentCaptchaString) {
                document.getElementById('captchaError').style.display = 'block';
                generateCaptcha();
                document.getElementById('captchaInput').value = '';
                document.getElementById('captchaInput').focus();
                return;
            }

            document.getElementById('captchaError').style.display = 'none';

            const formData = new FormData(form);
            const name = formData.get('name');
            const rating = parseInt(formData.get('rating'));
            const message = formData.get('message');

            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US') + ' ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

            const feedbackData = {
                name: name,
                rating: rating,
                message: message,
                date: dateStr
            };

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify(feedbackData)
                });

                if (response.ok) {
                    form.style.display = 'none';
                    successMessage.style.display = 'block';
                    localStorage.setItem('natnat_feedback_last_submit', Date.now().toString());
                } else {
                    generateCaptcha();
                }
            } catch (error) {
            }
        });
    </script>
</body>
</html>
