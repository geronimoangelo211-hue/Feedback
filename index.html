<form id="feedbackForm" style="display: none;">
            <h2>Thank you and Provide some Feedback.</h2>
            <p>Let us know how we did today.</p>

            <label style="display: block; text-align: center; font-weight: 600; font-size: 14px; margin-bottom: 8px;">Your Rating:</label>
            
            <div class="rating-wrapper">
                <div class="rating-group" id="rating-group">
                    <input type="radio" id="star5" name="rating" value="5" required />
                    <label for="star5">★</label>
                    <input type="radio" id="star4" name="rating" value="4" />
                    <label for="star4">★</label>
                    <input type="radio" id="star3" name="rating" value="3" />
                    <label for="star3">★</label>
                    <input type="radio" id="star2" name="rating" value="2" />
                    <label for="star2">★</label>
                    <input type="radio" id="star1" name="rating" value="1" />
                    <label for="star1">★</label>
                </div>
                <img id="reactionImage" class="reaction-image" alt="Reaction">
            </div>

            <div class="form-group">
                <label for="employeeName">Rate an Employee (Optional):</label>
                <select id="employeeName" name="employeeName" style="width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-family: inherit; font-size: 16px; background-color: white;">
                    <option value="">-- General Store Feedback --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" placeholder="Tell us what you think..." required></textarea>
            </div>

            <div class="form-group">
                <label>Verify you are human:</label>
                <div class="slider-captcha-wrapper" id="sliderCaptchaWrapper">
                    <div class="slider-puzzle-container">
                        <canvas id="captchaBg"></canvas>
                        <canvas id="captchaPiece"></canvas>
                        <div class="captcha-refresh" id="refreshCaptcha">↻</div>
                    </div>
                    <div class="slider-control" id="sliderControl">
                        <div class="slider-track-text" id="sliderTrackText">Slide to complete the puzzle</div>
                        <div class="slider-fill" id="sliderFill"></div>
                        <div class="slider-thumb" id="sliderThumb">➔</div>
                    </div>
                </div>
                <div id="captchaError">Puzzle failed. Please try again.</div>
            </div>

            <button type="submit">Submit Feedback</button>
        </form>
